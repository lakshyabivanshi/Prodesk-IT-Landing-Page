<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width , initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <title>Cash Flow</title>
</head>

<body
    class="min-h-screen w-full flex justify-center bg-[#09090b] bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(120,119,198,0.5),rgba(255,255,255,0))] items-center text-white m-0 p-4">

    <div
        class="h-auto w-full sm:w-[380px] bg-zinc-900/40 backdrop-blur-xl border border-purple-500/30 rounded-2xl flex flex-col justify-start p-5 shadow-[0_0_40px_rgba(147,51,234,0.25)] border-t-purple-500/50">
        <h1
            class="text-3xl mt-1 mb-2 font-bold text-center bg-gradient-to-r from-purple-400 via-violet-500 to-indigo-400 bg-clip-text text-transparent drop-shadow-[0_0_15px_rgba(147,51,234,0.7)]">
            Cash Flow Tracker</h1>

        <div id="error-msg"
            class="hidden h-auto w-full border border-red-500/40 bg-red-950/40  text-red-400 text-sm  rounded-xl text-center mb-3 backdrop-blur-md shadow-[0_0_15px_rgba(239,68,68,0.1)]">
            <p class="text-center p-2">Error! Please fill all the fields completely <br>(Empty or Negative values are
                not allowed)</p>
        </div>

        <form id="cashFlowform">
            <label for="totalSalary" class="font-semibold mb-1.5">Enter Your Total Salary</label>
            <input id="totalSalary" type="number" placeholder="eg. ₹15000"
                class="border border-zinc-800 rounded-xl w-full bg-zinc-950/80 text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500/50 focus:shadow-[0_0_15px_rgba(168,85,247,0.3)] transition-all duration-200 mb-2 p-2.5">

            <label for="expensesName" class="font-semibold mb-1.5">Enter Your Expenses Name</label>
            <input id="expensesName" type="text" placeholder="eg. Room Rent"
                class="border border-zinc-800 rounded-xl w-full bg-zinc-950/80 text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500/50 focus:shadow-[0_0_15px_rgba(168,85,247,0.3)] transition-all duration-200 mb-2 p-2.5">

            <label for="expensesAmount" class="font-semibold mb-1.5">Enter Your Expenses Amount</label>
            <input id="expensesAmount" type="number" placeholder="eg. ₹5000"
                class="border border-zinc-800 rounded-xl w-full bg-zinc-950/80 text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500/50 focus:shadow-[0_0_15px_rgba(168,85,247,0.3)] transition-all duration-200 mb-2 p-2.5">

            <button type="submit" id="submitBtn"
                class="p-3 w-full rounded-xl bg-gradient-to-r from-purple-600 to-indigo-600 font-bold tracking-wide cursor-pointer shadow-[0_4px_12px_rgba(147,51,234,0.3)] hover:shadow-[0_0_25px_rgba(168,85,247,0.8)] hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 ease-in-out">SUBMIT</button>
        </form>

        <hr class="border-white/20 mt-4">

        <div class="flex justify-between text-lg text-blue-500">
            <span class="font-semibold">Total Salary:</span>
            <span id="displaySalary" class="font-semibold">₹0</span>
        </div>

        <div class="flex justify-between text-lg text-red-500">
            <span class="font-semibold">Total Expenses:</span>
            <span id="displayExpenses" class="font-semibold">₹0</span>
        </div>

        <div class="flex justify-between text-lg text-green-500">
            <span class="font-semibold">Remaining Balance:</span>
            <span id="displayBalance" class="font-semibold">₹0</span>
        </div>

        <ul id="expenseList" class="space-y-2 m-1"></ul>
    </div>

    <script src="app.js"></script>
</body>

</html>
