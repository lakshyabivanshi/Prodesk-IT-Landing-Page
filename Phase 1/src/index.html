<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <title>Dev-Detective</title>
</head>

<body
    class="bg-[radial-gradient(circle_at_50%_50%,_#1a233d_0%,_#0d111a_100%)] text-slate-100 min-h-screen flex justify-center items-center p-6">
    <div class="w-full max-w-[760px] flex flex-col gap-7">
        <header class="flex justify-between items-center px-1">
            <h1 class="text-3xl font-bold tracking-tight">Dev
                <span
                    class="bg-gradient-to-r from-[#00f2fe] to-[#4facfe] bg-clip-text text-transparent">Detective</span>
            </h1>
            <span
                class="text-[11px] uppercase tracking-[2px] text-slate-400 bg-white/5 px-3 py-1 rounded-full border border-white/5">Github
                Engine</span>
        </header>

        <div
            class="bg-slate-800/70 backdrop-blur-xl p-2 pl-6 rounded-2xl flex justify-between items-center border border-white/10 shadow-2xl focus-within:border-[#4facfe]/50 focus-within:shadow-[0_20px_40px_-15px_rgba(79,172,254,0.15)] transition-all duration-300 relative group">
            <div class="flex items-center gap-4 flex-1">
                <input type="text" id="search-input" placeholder="Enter Github Username"
                    class="bg-transparent text-white placeholder-slate-400 focus:outline-none w-full text-base">
                <span id="error-msg"
                    class="hidden text-xs font-black text-red-400 bg-red-500/10 px-3 py-1.5 rounded-3xl whitespace-nowrap md:static absolute -bottom-12 left-1/2 -translate-x-1/2 md:translate-x-0">No
                    User Found</span>
                <button id="search-btn"
                    class="bg-gradient-to-r from-[#00f2fe] to-[#4facfe] text-slate-900 font-semibold px-7 py-3.5 rounded-[14px] shadow-[0_4px_15px_rgba(79,172,254,0.3)] hover:-translate-y-0.5 hover:shadow-[0_6px_20px_rgba(79,172,254,0.4)] active:translate-y-0 transition-all duration-200">Search</button>
            </div>
        </div>

        <div id="loader" class="hidden flex flex-col items-center gap-4 my-8">
            <div class="w-11 h-11 border-4 border-[#4facfe]/10 border-t-[#00f2fe] rounded-full animate-spin"></div>
            <p class="text-sm text-sky-400 tracking-wider animate-pulse">Loading Data..</p>
        </div>

        <main id="profile-card"
            class="hidden bg-slate-800/40 backdrop-blur-xl p-11 rounded-3xl flex flex-col md:flex-row gap-11 border border-white/5 shadow-2xl">
            <div class="flex justify-center items-center shrink-0 w-full md:w-auto">
                <div
                    class=" relative w-28 h-28 before:content-[''] before:absolute before:inset-0 before:bg-gradient-to-r before:from-[#00f2fe] before:to-[#4facfe] before:rounded-full before:blur-md before:opacity-40 before:-z-10">
                    <img id="avatar" src="https://githubassets.com/images/modules/logos_page/Github-Mark.png"
                        alt="user avatar" class="w-28 h-28 rounded-full object-cover border-2 border-white/10">
                </div>
            </div>

            <div class="flex-1 flex flex-col gap-6 text-center md:text-left">
                <div class="flex flex-col md:flex-row justify-between items-center md:items-start gap-2 md:gap-0">
                    <div>
                        <h2 id="user-name" class="text-3xl font-semibold tracking-tight text-white">The Octocat</h2>
                        <a id="user-username-link" href="#" target="_blank" class="inline-block">
                            <p id="user-username"
                                class="text-sky-400 text-sm mt-1 hover:text-[#00f2fe] transition-colors duration-200">
                                @octocat</p>
                        </a>
                    </div>

                    <p id="user-joined" class="text-slate-400 text-sm md:mt-2">Joined 25 Jan 2011</p>
                </div>

                <p id="user-bio" class="text-slate-300 text-[16px]">This profile has no bio. Lorem ipsum dolor sit amet
                    consectetur, adipisicing elit. Qui, molestiae!</p>

                <div
                    class="text-sm bg-white/2 px-[18px] py-3 rounded-xl border border-white/4 w-fit mx-auto md:mx-0 md:self-start flex items-center gap-3">
                    <span class="opacity-80">🔗</span>
                    <a id="user-url" href="https://github.blog" target="_blank"
                        class="text-slate-300 hover:text-[#00f2fe] transition-colors duration-200">https://github.blog</a>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
