<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Habit Tracker</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="name-screen" class="card name-screen animate-fade-up">
    <div class="icon-badge main-badge">🔥</div>
    <h1>Habit Tracker</h1>
    <p class="subtitle">Small daily actions create big results.</p>
    
    <div class="divider"></div>

    <div class="form-group">
      <label>Your name</label>
      <input id="name-input" type="text" placeholder="e.g. Alex" class="habit-input" />
      <button id="name-submit-btn" class="btn btn-block">Let's Go</button>
    </div>
  </div>

  <div id="main-screen" class="card main-screen animate-fade-up hidden">
    <div class="header-band">
      <div class="header-row">
        <div class="logo-area">
          <div class="icon-badge small-badge">🔥</div>
          <h1>Habit Tracker</h1>
        </div>
        <span id="habit-count" class="badge hidden">0 habits</span>
      </div>
      <p id="greeting"></p>
      <p class="subtitle">
        Daily actions create big results 🔥 <br>
        <span class="highlight">Let's keep the streak alive!</span>
      </p>
    </div>

    <div class="divider"></div>

    <div class="add-habit-band">
      <label>Add new habit</label>
      <div class="input-row">
        <input id="habit-input" type="text" placeholder="e.g. Drink water, Read 10 pages…" class="habit-input" />
        <button id="add-habit-btn" class="btn">+ Add</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="list-band">
      <div id="habits-section" class="hidden">
        <label>Today you have to do:</label>
        <ul id="habit-list">
          </ul>
      </div>

      <div id="empty-state" class="empty-state">
        <div class="empty-icon">📋</div>
        <p>You haven't added any habits yet.<br>Start by typing one above!</p>
      </div>
    </div>

    <div class="divider"></div>
    
    <footer>
      <p>Your data is saved locally in your browser</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
