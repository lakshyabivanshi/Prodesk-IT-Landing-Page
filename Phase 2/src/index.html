<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <title>Cover Letter Generator</title>
</head>

<body class="bg-gray-200 text-black font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-xl bg-white p-8 rounded-xl shadow-sm border border-gray-200">
        <h2 class="text-2xl font-bold text-center text-black mb-6">Cover Letter Generator</h2>

        <form id="coverLetterForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Candidate Name</label>
                <input type="text" id="name" required placeholder="Enter Your Name"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:outline-none text-base text-black">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Job Role</label>
                <input type="text" id="role" required placeholder="Frontend Developer"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:outline-none text-base text-black">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Target Company</label>
                <input type="text" id="company" required placeholder="Prodesk IT"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:outline-none text-base text-black">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Key Skills</label>
                <input type="text" id="skills" required placeholder="React, JavaScript, Tailwind CSS"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:outline-none text-base text-black">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-purple-700 text-white py-3 rounded-lg font-bold hover:bg-purple-800 transition-colors text-base cursor-pointer">Generate
                Cover Letter</button>
        </form>

        <div id="loadingState" class="hidden mt-6 text-center">
            <div class="inline-block rounded-full h-8 w-8 border-b-2 border-purple-700 animate-spin mb-2"></div>
            <p class="text-sm font-semibold text-purple-700">AI is crafting your cover letter, please wait</p>
        </div>

        <div id="outputContainer" class="hidden mt-8 pt-6 border-t border-gray-300">
            <div class="flex justify-between items-center mb-3">
                <span class="text-sm font-semibold text-gray-500">Generated Output: </span>
                <button id="copyBtn"
                    class="bg-purple-700 hover:bg-purple-900 text-white px-3 py-1.5 rounded-md text-xs font-bold transition-all cursor-pointer">Copy
                    To Clipboard</button>
            </div>
            <div id="Outputbox"
                class="bg-gray-50 p-5 rounded-lg border border-gray-200  whitespace-pre-wrap leading-relaxed text-gray-700 text-sm">
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
